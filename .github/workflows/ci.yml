name: "Sample React CI Pipeline/Workflow"

on:
    push:
        branches:
            - main
            - master

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - name: "Setup Node JS"
              uses: actions/setup-node@v4
              with:
                  node-version: "21"

            - name: "Chech Node Version"
              run: node --version

            - name: "Clone the Repository"
              uses: actions/checkout@v4

            - name: "List Directories"
              run: ls

            - name: "Install Dependencies"
              run: npm install

            - name: "List Directories"
              run: ls

            - name: "Run tests"
              run: npm test

            - name: "Run build"
              run: npm run build
